Journal_General_Mining_Compendium_Content=To promote the entrepreneurial spirit of the modern miner, the United Resource Workers have put together a handy guide listing the most common locations to find minerals, ores, and gemstones across the ‘verse.\n** Legendary **\nQuantainium - Found in All Stanton Deposits\nSavrilium - Glaciem Ring, Keeger Belt, QV Breaker Stations (Nyx)\nStileron - All Pyro Planets, Akiro Cluster, Pyro Asteroid Clusters\n\n** Epic **\nLindinium - Glaciem Ring, Keeger Belt\nOuratite - Aberdeen, Arial, Hurston, Yela Ring\nRiccite - Adir, Akiro Cluster, Bloom, Ignis, Pyro Asteroid Clusters, Terminus, Vatra\n\n** Rare **\nBeryl - Aaron Halo, ARC-L3, CRU-L5, MIC-L4, Pyro Asteroid Clusters, Wala\nBexalite - CRU-L1, CRU-L2, Fairo, Fuego, Glaciem Ring, HUR-L3, Keeger Belt, Pyro Asteroid Clusters, Vuur\nBorase - Adir, Bloom, Fuego, HUR-L1, HUR-L4, HUR-L5, Pyro Asteroid Clusters, Pyro IV\nGold - ARC-L5, CRU-L4, Fairo, Ignis, MIC-L3, Pyro Asteroid Clusters, Terminus, Vatra\nTaranite - ARC-L1, ARC-L2, ARC-L4, Cellin, Clio, Euterpe, HUR-L2, Pyro Asteroid Clusters, Yela\n\n** Uncommon **\nAgricium - ARC-L3, Cellin, CRU-L5, Daymar, MIC-L4, Pyro Asteroid Clusters, Terminus, Vuur, Yela\nAslarite - Aaron Halo, ARC-L5, CRU-L4, Fuego, Ita, Magda, MIC-L4, Pyro Asteroid Clusters, Vuur\nLaranite - HUR-L1, HUR-L4, HUR-L5, Lyria, Pyro IV, Wala\nTitanium - Aaron Halo, Aberdeen, CRU-L1, CRU-L2, HUR-L3, Magda, Pyro Asteroid Clusters, Terminus, Yela Ring\nTorite - Akiro Cluster, CRU-L3, Glaciem Ring, Keeger Belt, MIC-L1, MIC-L2, MIC-L5, Pyro Asteroid Clusters, QV Breaker Stations (Nyx)\nTungsten - Adir, ARC-L1, ARC-L2, ARC-L4, Fairo, HUR-L2, Pyro Asteroid Clusters\n\n** Common **\nAluminium - Aaron Halo, Aberdeen, ARC-L1, ARC-L2, Arial, CRU-L3, Glaciem Ring, HUR-L1, HUR-L2, HUR-L4, HUR-L5, Ita, Keeger Belt, Magda, MIC-L1, MIC-L2, MIC-L5, Pyro Asteroid Clusters\nCopper - Aaron Halo, Akiro Cluster, ARC-L3, ARC-L5, Clio, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Euterpe, Lyria, MIC-L3, MIC-L4, Pyro Asteroid Clusters, Pyro I, Pyro IV, Terminus, Wala, Yela Ring\nCorundum - Aberdeen, ARC-L1, ARC-L2, ARC-L4, Arial, CRU-L3, Hurston, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, MIC-L2, MIC-L5, Pyro Asteroid Clusters\nHephaestanite - Arial, ARC-L1, ARC-L2, ARC-L4, Calliope, CRU-L3, Fuego, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, microTech, MIC-L2, MIC-L5, Monox, Pyro Asteroid Clusters, Vuur\nIce - Aaron Halo, Akiro Cluster, ARC-L3, ARC-L5, Calliope, Clio, Euterpe, Glaciem Ring, HUR-L3, Keeger Belt, microTech, MIC-L3, MIC-L4, Pyro Asteroid Clusters, Yela Ring\nIron - Aaron Halo, Adir, Akiro Cluster, ARC-L3, ARC-L5, Bloom, Calliope, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Fairo, Fuego, Glaciem Ring, HUR-L3, Keeger Belt, Lyria, Magda, microTech, MIC-L3, MIC-L4, Monox, Pyro Asteroid Clusters, Pyro I, Pyro IV, Vatra, Vuur, Wala, Yela Ring\nQuartz - Bloom, Cellin, Daymar, Pyro Asteroid Clusters, Yela\nSilicon - Aaron Halo, Akiro Cluster, Cellin, Daymar, Fairo, Ignis, Pyro Asteroid Clusters, Vatra, Yela\nTin - Arial, Hurston, Ignis, Ita, Monox, Pyro Asteroid Clusters, Pyro I\n\n** Hand Mineables **\nAphorite - All Moons/Planets/Caves\nBeradon - Bloom, Pyro I\nCaranite - Aberdeen, Daymar\nDolivine - All Moons/Planets/Caves\nFeynmaline - Pyro IV\nGlacosite - Monox\nHadanite - All Moons/Planets/Caves\nJanalite - Daymar, Hurston, Ita, Magda Sand Caves, Wala\nSadaryx - QV Breaker Stations (Nyx)\nNote from MrKraken - This just organises the ores by category, if CIG haven't updated the locations that's on them!
Journal_General_Refueling_Content=MrKraken QoL Quick Tips\n- To refuel your pods, use the Manual buttons in landing services screen\n- Refuel Mode default keybind: M\n- Approach ship, target, use docking request RALT + N and then go hands-off as it will auto-dock\n- Once docked, go to your refuel terminal and open flow on the pods\n- When finished switching out of refuelling mode will undock\n\nSometimes the unexpected happens - a job demands a sudden detour, a time crunch forces a missed refuel stop, or inexperience just bites a pilot on the behind. Whatever the reason, if a pilot finds themselves hanging in the interstellar void with a fuel gauge on zero, that's where The United Wayfarers Club can help.\n\nWhile most pilots prefer to refuel in a hangar when possible, if they find themselves unable to, they can create a beacon to request assistance from a qualified contractor. The UWC prides itself on a proven track record several centuries long of our dedicated team of responders getting ships back flying.\n\nIn this guide, we'll cover the four basic steps of the UWC refueling protocol: CONTRACT, REFUELING MODE AND DOCKING, PRICE, REFUEL.\n\nCONTRACT\nBefore accepting a contract, ask yourself:\n* Do you have the right type of fuel - Quantum or Hydrogen - in sufficient quantity for the job? You can top up your fuel pods in the station, using the Vehicle Maintenance App.\n* Does your ship have the right combination of fuel pods and nozzles? This loadout will determine the capacity and refueling speed of your ship. Refueling speed is an important factor. Outlaws scan for beacons and might already be en route. The quicker the refuel, the less chance of unwanted company.\n* On very rare occasions it may turn out that you're responding to a false beacon - bait for an ambush. Depending on what your gut tells you about a job, you might want to consider reaching out to a fellow affiliate to provide back-up. And if the job turns out to be legitimate, it's all good.  The UWC would sooner see you safely home, your vessel and your skin intact, ready for that next contract.\n\nREFUELING MODE AND DOCKING\nWhen you arrive at the beacon's location, maneuver into close proximity to the customer vessel and initiate refuelling mode. This will extend your ship's refuelling nozzle and you will then be able to send a docking request. Once your docking request has been accepted, you can dock.\n\nPRICE\nOn a United Wayfarers Club contract, you will be paid at a pre-agreed upon fuel rate and be entitled a UWC service fee. Any non-UWC contracts should be negotiated between you and your client.\n\nThey will then be able to accept or decline through the mobiGlas. You can set your price at any time - no matter where you are, or whether you have accepted a contract - but you cannot change the price once your client has docked with you. \n\nIt might be tempting to take advantage of the situation and set a high price for the fuel you're carrying - after all, you're not the one hanging in space, running on fumes - but we urge you to be mindful about not overpricing your services. The customer might not always be right, but they always have the right to look for a better offer. \n\nREFUEL\nOnce the customer has accepted the price, the fuel transfer can begin. While you can transfer fuel in-between pods at any time, you need at least one pod of the required fuel to be opened for the customer's ship to be refueled. \n\nWHAT'S NEXT\nOnce the tanks are full and the customer's happy, head to a station to refill your fuel pods, using the Vehicle Maintenance app in your mobiGlas, and you're ready for the next contract.
